name: Claude Remote Edit

on:
  issues:
    types: [opened]

jobs:
  claude-edit:
    # Only run when opened by the repo owner or has the "claude" label
    if: >
      github.actor == 'bradley-t-t' ||
      contains(github.event.issue.labels.*.name, 'claude')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: core
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Configure Git for GitHub packages
        run: git config --global url."https://github.com/".insteadOf ssh://git@github.com/

      - name: Install dependencies
        run: npm ci

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            ${{ github.event.issue.body }}

            After making the requested changes:
            1. Run 'npm run lint' and fix any errors
            2. Run 'npm run build' (with CI=false env var) to verify the build passes
            3. Do NOT commit — the workflow handles that
          allowed_tools: "Edit,Write,Read,Glob,Grep,Bash"
          max_turns: "50"
          model: "claude-sonnet-4-20250514"

      - name: Run lint
        run: npm run lint

      - name: Run build
        env:
          CI: false
        run: npm run build

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "claude-bot"
          git config user.email "claude-bot@users.noreply.github.com"
          git add -A
          git commit -m "${{ github.event.issue.title }}

          Automated edit via Claude Code from issue #${{ github.event.issue.number }}

          Co-Authored-By: Claude <noreply@anthropic.com>"
          git push origin core

      - name: Comment and close issue on success
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '✅ Changes committed and pushed to `core`. Vercel deployment should start shortly.'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });

      - name: Comment on no changes
        if: steps.changes.outputs.has_changes == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⚠️ Claude processed the request but no file changes were made.'
            });

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '❌ Claude edit failed. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.'
            });
